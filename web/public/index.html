<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chem MLOps Chat</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="layout">
      <header class="top-bar">
        <h1>Chem MLOps Chat</h1>
        <p id="model-label">Loading model...</p>
      </header>

      <div class="chat-grid">
        <div class="pane">
          <div class="pane__header" id="header-finetuned">Finetuned</div>
          <section id="messages-finetuned" class="messages" aria-live="polite" aria-label="Finetuned chat messages"></section>
        </div>
        <div class="pane">
          <div class="pane__header" id="header-rag">RAG</div>
          <section id="messages-rag" class="messages" aria-live="polite" aria-label="RAG chat messages"></section>
        </div>
      </div>

      <form id="chat-form" class="input-row">
        <textarea
          id="input"
          placeholder="Message both models..."
          rows="2"
          aria-label="Chat message"
        ></textarea>
        <button id="btn" type="submit">Send</button>
      </form>
    </div>

    <script type="module" src="/frontend.js"></script>
  </body>
</html>
