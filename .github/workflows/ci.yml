name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: macos-latest  # Apple Silicon — required for mlx-lm
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version-file: .python-version

      - run: uv sync --frozen --group default --group dev

      - run: uv run ruff check .

      - run: uv run ty check

      - run: uv run pytest

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: bun test
